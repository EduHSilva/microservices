services:

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: [ "CMD-SHELL","pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5


  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    healthcheck:
      test: [ "CMD","rabbitmq-diagnostics","check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5


  service-discover:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: service-discover
    container_name: service-discover
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8761:8761"


  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin
    container_name: admin
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9091/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    ports:
      - "9091:9091"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discover:8761/eureka/


  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
    container_name: gateway
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discover:8761/eureka/
    ports:
      - "8080:8080"


  users:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: users
    container_name: users
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8181/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discover:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8181:8181"


  payments:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payments
    container_name: payments
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8282/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discover:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8282:8282"


  crm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: crm
    container_name: crm
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8383/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discover:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8383:8383"


  notifications:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications
    container_name: notifications
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8484/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notifications
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discover:8761/eureka/

    ports:
      - "8484:8484"


  finances:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: finances
    container_name: finances
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8989/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finances
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discover:8761/eureka/
    ports:
      - "8989:8989"


  tasks:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: tasks
    container_name: tasks
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8686/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tasks
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discover:8761/eureka/
    ports:
      - "8686:8686"


  fitness:
    platform: linux/amd64
    build:
      context: fitness
      dockerfile: Dockerfile
    container_name: fitness
    restart: unless-stopped
    depends_on:
      service-discover:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9090/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/health?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      EUREKA_URL: http://service-discover:8761/eureka
      SERVICE_NAME: FITNESS
      SERVICE_HOST: fitness
      SERVICE_PORT: 9090
      FOOD_API_HOST: ${FOOD_API_HOST:-}
      FOOD_API_KEY: ${FOOD_API_KEY:-}
      FOOD_APP_ID: ${FOOD_APP_ID:-}
      GPT_API_URL: ${GPT_API_URL:-}
      GPT_API_KEY: ${GPT_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      EXERCISES_API_HOST: ${EXERCISES_API_HOST:-}
      EXERCISES_API_KEY: ${EXERCISES_API_KEY:-}
      PORT: 9090
    ports:
      - "9090:9090"
  nginx:
    image: nginx:1.28-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/certbot/www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - default

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
      while :;
      do
        certbot renew;
        sleep 12h;
      done"
    networks:
      - default

volumes:
  postgres-data:
  rabbitmq-data:
  letsencrypt:
