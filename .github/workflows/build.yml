name: Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:

  test-java:
    name: Test Java
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Maven Verify
        run: mvn clean verify

  test-go:
    name: Test Go
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: health

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Go Test
        run: go test ./...

  build-images:
    name: Build Docker Images

    needs:
      - test-java
      - test-go

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        service:
          - service-discover
          - gateway
          - users
          - crm
          - payments
          - notifications
          - finances
          - tasks
          - health

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest \
            .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest

  deploy:
    name: Deploy

    needs: build-images

    if: false

    runs-on: ubuntu-latest

    steps:
      - run: echo "Deploy disabled"