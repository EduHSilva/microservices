name: Build

on:
  push:
    branches:
      - main

jobs:

  test-java:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Maven Verify
        run: mvn clean verify

  test-go:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: health

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - run: go test ./...

  build-images:

    needs:
      - test-java
      - test-go

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - users
          - payments
          - crm
          - notifications
          - finances
          - tasks
          - gateway
          - service-discover
          - health
  deploy:

    needs: build-images

    runs-on: ubuntu-latest

    steps:

      - uses: appleboy/ssh-action@v1

        with:

          host: ${{ secrets.SERVER }}

          username: ubuntu

          key: ${{ secrets.SSH_KEY }}

          script: |

            cd /home/ubuntu/micro-services

            docker compose pull

            docker compose up -d